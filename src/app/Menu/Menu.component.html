      <!-- Dashboard -->
      <button
        class="w-full flex items-center justify-between px-4 py-3 rounded-lg mb-1 darkText"

        [routerLinkActiveOptions]="{ exact: true }"
      >
        <div class="flex items-center gap-3">
          <lucide-icon
            [img]="icons.LayoutDashboard"
            class="iconcolor w-5 h-5 iconcolor"
          ></lucide-icon>
          <a href="" routerLink="dashboard"> <span class="font-medium">Dashboard</span></a>
        </div>
        <lucide-icon [img]="icons.ChevronDown" class="w-4 h-4"></lucide-icon>
      </button>
      <!-- AI Assistant -->
