<app-Heading title="Product Management">
<p class="text-white mt-2 flex items-center gap-2">
  Category <lucide-angular [img]="icons.ChevronRight" class="h-6 w-6 text-white"></lucide-angular>
  <span class="inline-flex items-center justify-center rounded-lg px-3.5 py-0.5 bg-orange-800 text-center transform-translate-y-1">
    Laptop
  </span>
</p>
</app-Heading>

<h2></h2>
 <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:grid-cols-2">
    @for (products of productData(); track products.id) {
      <div
        class="bg-white duration-200  transition-transform hover:scale-[1.02] rounded-xl shadow-sm border border-gray-200 p-5 hover:shadow-md transition-shadow relative"
      >
        <div class=" items-center space-y-4">
          <img [src]="products.thumbnail" class=" rounded-lg bg-gray-50" alt="Avatar" />
          <div>
            <h3 class="text-lg font-bold darkText leading-tight">
              {{ products.title }}
            </h3>
            <p class="text-sm text-gray-500">{{ products.price | currency: 'ZAR' : 'symbol-narrow' : '4.2-2' }}</p>
            <p class="mt-2 pt-1 border-t border-gray-100 text-sm text-gray-600">
              <span class="font-medium mr-2">Brand:</span> {{ products.brand }}
            </p>
          </div>
        </div>

        <div>
          <button
          type="button"
            
            class="absolute right-0 top-0 flex items-center gap-2 rounded-lg   p-2.5 font-medium transition-colors hover:bg-gray-50"
          >
            <!-- Icon Wrapper -->
            <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-orange-600 text-white">
             <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 4h1.5L8 16m0 0h8m-8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm8 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm.75-3H7.5M11 7H6.312M17 4v6m-3-3h6"></path>
            </svg>
            </div>

          </button>
        </div>
        <!-- <div class="mt-4 pt-4 border-t border-gray-100 text-sm text-gray-600">
        <div class="flex items-center mb-1">
          <span class="font-medium mr-2">Email:</span> {{ customer.email }}
        </div>
      </div> -->
      </div>
    } @empty {
      <div class="col-span-full text-center py-12 bg-gray-50 rounded-xl">
        <p class="text-gray-500 font-medium animate-pulse">
  Loading Data...
</p>
      </div>
    }
  </div>
