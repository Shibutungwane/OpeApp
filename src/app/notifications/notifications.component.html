@if(notificationData()?.length) {

<!-- Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
     (click)="closeModal()">

  <!-- Modal Card -->
  <div class="w-full max-w-lg rounded-2xl bg-white shadow-2xl"
       (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-center justify-between p-6 border-b">
      <h2 class="text-2xl font-bold text-gray-800">
        Notifications
      </h2>

      <button (click)="closeModal()"
              class="text-white text-lg bg-orange-600 hover:bg-orange-700 rounded-lg px-3 py-1.5 transition">
        ✕
      </button>
    </div>

    <!-- Notification List -->
    <div class="max-h-96 overflow-y-auto divide-y">

      @for (notify of notificationData(); track notify.id) {

        
        <div class="relative flex items-start gap-4 p-5 hover:bg-orange-50 transition-all duration-200 group">

          <!-- Unread Dot -->
          <span class="absolute left-6 top-6 w-2.5 h-2.5 bg-green-500 rounded-full"></span>

          <!-- Avatar -->
          <img src="/profile.jpg"
               class="w-14 h-14 rounded-full object-cover border-2 border-orange-100 shadow-sm" />

          <!-- Content -->
          <div class="flex-1">

            <div class="flex items-center justify-between">

              <h3 class="text-base font-semibold text-gray-800 group-hover:text-orange-600 transition">
                {{ notify?.user?.fullName }}
              </h3>

              <!-- Time (if available) -->
              <span class="text-xs text-gray-400 flex items-center gap-1">
                {{ notify?.createdAt || 'Just now' }}
              </span>

            </div>

            <p class="text-sm text-gray-600 mt-1 leading-relaxed">
              {{ notify.body }}
            </p>

          </div>
           </div>
        }

      @empty {

        <div class="text-center py-10">
          <p class="text-gray-500 font-medium">
            No Notifications
          </p>
        </div>

      }

    </div>

    <!-- Footer -->
    <div class="p-5 border-t">
      <button (click)="closeModal()"
              class="w-full rounded-xl bg-orange-600 py-3 font-bold text-white hover:bg-orange-700 transition">
        Close
      </button>
    </div>

  </div>
</div>

}
