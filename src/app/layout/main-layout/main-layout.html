<div class="flex min-h-screen w-full bg-gray-100">

  <!-- Sidebar is now part of flex layout -->
<!-- ✅ Hamburger (mobile only) -->
<button
  (click)="toggleMenu()"
  class="md:hidden fixed top-4 left-4 z-50 p-2 bg-yellow-600 text-white rounded-md shadow-md"
>
  <lucide-icon [img]="icons.Menu" class="w-6 h-6"></lucide-icon>
</button>

<!-- ✅ Overlay (mobile only) -->
@if (isMenuOpen()) {
  <div
    (click)="toggleMenu()"
    class="fixed inset-0 bg-black/50 z-40 md:hidden"
  ></div>
}

<!-- ✅ SINGLE SIDEBAR (works for mobile + desktop) -->
<aside
  [class.-translate-x-full]="!isMenuOpen()"
  class="fixed md:static top-0 left-0 h-screen md:h-auto
         w-[286px] md:w-64
         bg-white 
         z-50
         transform transition-transform duration-300 ease-in-out
         md:translate-x-0"
>
  <div class="flex-1 overflow-y-auto">
    
    <!-- Logo -->
    <a routerLink="dashboard" (click)="isMenuOpen.set(false)">
      <div class="flex items-center gap-3 p-6 border-b border-gray-100">
        <div class="w-10 h-10 logobg rounded-lg flex items-center justify-center">
          <div class="w-6 h-6 border-2 border-white rounded"></div>
        </div>
        <span class="text-xl font-bold">Open App</span>
      </div>
    </a>

    <!-- Menu -->
    <nav class="p-4 space-y-1" (click)="isMenuOpen.set(false)">
      <!-- KEEP ALL YOUR EXISTING MENU BUTTONS HERE -->
      <app-Menu></app-Menu>
    </nav>

  </div>
</aside>
  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <app-header></app-header>

    <main class="flex-1 overflow-y-auto p-4 ">
      <div class="bg-white  p-6 md:p-6 rounded-sm shadow-sm">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

</div>
