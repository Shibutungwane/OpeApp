<div >
  <div class="">
  @if (userForm()) {
  <form [formGroup]="userForm()!" (ngSubmit)="onSubmit()">
    <!-- Header Card -->
    <div class=" inset-0 bg-[url('/bg6.jpg')] bg-cover rounded-lg p-6 mb-8 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <img
          src="/bg4.jpg"
          alt="Profile"
          class="w-16 h-16 rounded-full border-4 border-white object-cover"
        />

        <div class="text-white">
          <h1 class="text-2xl font-semibold mb-3">
             {{ userForm()?.value?.firstName }} {{ userForm()?.value?.lastName }}
          </h1>

          <div class="flex flex-col gap-1.5">
            <div class="flex items-center gap-2 text-sm">
              <lucide-icon [img]="MapPinIcon" class="w-4 h-4"></lucide-icon>
               <span>{{ userForm()?.value?.address?.city }}, {{ userForm()?.value?.address?.state }}</span>
  
            </div>

            <div class="flex items-center gap-2 text-sm">
              <lucide-icon [img]="PhoneIcon" class="w-4 h-4"></lucide-icon>
              <span>{{ userForm()?.value?.phone }}</span>
            </div>
          </div>
        </div>
      </div>

      <button type="submit"
        class="bg-white darktext   px-6 py-2.5 rounded-lg font-medium hover:bg-gray-50 transition-colors">
        Save
      </button>
    </div>

    <!-- Personal Information -->
    <div>
      <h2 class="text-xl font-semibold darktext   mb-6">
        Personal Information
      </h2>



      <div class="space-y-6">

        <!-- Row 1 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              First Name
            </label>
            <input
              type="text"
              formControlName="firstName"
              class="w-full px-4 py-3 bg-orange-50 border border-orange-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Last Name
            </label>
            <input
              type="text"
              formControlName="lastName"
              class="w-full px-4 py-3 bg-orange-50 border border-orange-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
            />
          </div>

          <!-- <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Your Location
            </label>

            <div class="relative">
              <lucide-icon
                [img]="MapPinIcon"
                class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500">
              </lucide-icon>

              <input
                type="text"
                  formControlName="password"
                class="w-full pl-10 pr-4 py-3 bg-orange-50 border border-orange-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
              />
            </div>
          </div> -->

           <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Email
            </label>

            <div class="relative">
              <!-- <lucide-icon
                [img]="Mail"
                class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500">
              </lucide-icon> -->

              <input
                type="text"
                  formControlName="email"
                class="w-full pl-4 pr-4 py-3 bg-orange-50 border border-orange-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
              />
            </div>
          </div>

             <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Your phone number
            </label>

            <div class="relative">
              <!-- <lucide-icon
                [img]="PhoneIcon"
                class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-500">
              </lucide-icon> -->

              <input
                type="tel"
                  formControlName="phone"
                class="w-full pl-4 pr-4 py-3 bg-orange-50 border border-orange-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent"
              />
            </div>
          </div>

        </div>

        <!-- Row 2 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

       

          <!-- <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Profile Picture
            </label>

            <div
              class="bg-orange-50 border-2 border-dashed border-orange-200 rounded-lg p-6 text-center hover:border-orange-300 transition-colors">

              <lucide-icon
                [img]="UploadIcon"
                class="w-8 h-8 text-blue-500 mx-auto mb-2">
              </lucide-icon>

              <div class="text-sm">
                <button class="text-blue-600 hover:text-blue-700 font-medium">
                  Click to upload
                </button>
                <span class="text-gray-600"> or drag & drop</span>
              </div>

              <p class="text-xs text-gray-500 mt-1">
                Max resolution 200×200px
              </p>
            </div>
          </div> -->

        </div>

      </div>

    </div>
      </form>
    }
    @else {
      <p class="animate-pulse">Loading Data</p>
    }
  </div>
   @if (savedData()) {
      <div class="toast-success  mt-2">
        Data Saved successfully!
      </div>
      }
</div>
