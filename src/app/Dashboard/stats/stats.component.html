<div class="z-10">
  <h3 [class]="'text-sm font-medium opacity-90 ' + currentStyle.text">
    {{ title }}
  </h3>
  
  <div [class]="'mt-2 text-3xl font-bold tracking-tight ' + currentStyle.text">
    {{ value }}
  </div>

  <div class="mt-4 flex items-center gap-3">
    <span [class]="'rounded-full px-2.5 py-0.5 text-xs font-semibold ' + currentStyle.badge">
      {{ percentage }}
    </span>
  </div>

  <div [class]="'mt-2 text-xs ' + currentStyle.subtext">
    {{ subtext }}
  </div>
</div>

<!-- Sparkline Chart -->
<div class="absolute bottom-0 right-0 h-24 w-32 translate-y-2 translate-x-2">
